<template>
    <template if:true={isOpen}>
        <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open"
            aria-modal="true"
            aria-labelledby="confirm-heading"
        >
            <div class="slds-modal__container">
                <div class="slds-modal__header warning-header">
                    <h1 id="confirm-heading" class="slds-modal__title warning-title">
                        {header}
                    </h1>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>{message}</p>
                </div>
                <div class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleCancel}>
                        {cancelLabel}
                    </button>
                    <button class="slds-button slds-button_brand" onclick={handleConfirm}>
                        {confirmLabel}
                    </button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
