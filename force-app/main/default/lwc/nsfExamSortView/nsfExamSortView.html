<template>
    <!-- Loading spinner -->
    <template if:true={isLoading}>
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <template if:false={isLoading}>
        <!-- ═══════════════════════════════════════ -->
        <!-- HEADER                                  -->
        <!-- ═══════════════════════════════════════ -->
        <div class="sort-header">
            <span class="sort-title">Reorder Questions</span>
            <div class="sort-controls">
                <lightning-button-icon
                    icon-name="utility:arrowup"
                    alternative-text="Move up"
                    variant="border-filled"
                    onclick={handleMoveUp}
                    class="slds-m-right_xx-small"
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:arrowdown"
                    alternative-text="Move down"
                    variant="border-filled"
                    onclick={handleMoveDown}
                ></lightning-button-icon>
            </div>
        </div>

        <!-- ═══════════════════════════════════════ -->
        <!-- QUESTION LIST                           -->
        <!-- ═══════════════════════════════════════ -->
        <template if:true={hasExams}>
            <div class="sort-list">
                <template for:each={displayExams} for:item="exam">
                    <div
                        key={exam.id}
                        class={exam.rowClass}
                        data-index={exam.index}
                        onclick={handleSelectRow}
                    >
                        <span class="sort-row-number">{exam.position}</span>
                        <span class="sort-row-text">{exam.question}</span>
                    </div>
                </template>
            </div>
        </template>

        <template if:false={hasExams}>
            <div class="empty-state">
                <p>No questions in this section to reorder.</p>
            </div>
        </template>

        <!-- ═══════════════════════════════════════ -->
        <!-- FOOTER                                  -->
        <!-- ═══════════════════════════════════════ -->
        <div class="sort-footer">
            <lightning-button
                label="Cancel"
                variant="neutral"
                onclick={handleCancel}
            ></lightning-button>
            <lightning-button
                label="Save Order"
                variant="brand"
                onclick={handleSave}
                disabled={isSaving}
            ></lightning-button>
        </div>
    </template>
</template>
