<template>
    <template if:true={isOpen}>
        <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open"
            aria-modal="true"
            aria-labelledby="modal-heading"
            onkeydown={handleKeyDown}
        >
            <div class="slds-modal__container">
                <button
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close"
                    onclick={handleCancel}
                >
                    <lightning-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        size="small"
                        variant="inverse"
                    ></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <div class="slds-modal__header">
                    <h1 id="modal-heading" class="slds-modal__title slds-hyphenate">
                        {header}
                    </h1>
                </div>
                <div class="slds-modal__content slds-p-around_medium" id="modal-content">
                    <slot></slot>
                    <template if:true={errorMessage}>
                        <div class="slds-text-color_error slds-m-top_small">
                            {errorMessage}
                        </div>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleCancel}>
                        {cancelButtonLabel}
                    </button>
                    <button class={confirmButtonClass} onclick={handleConfirm}>
                        {confirmButtonLabel}
                    </button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" onclick={handleBackdropClick}></div>
    </template>
</template>
