<template>
    <!-- Loading spinner -->
    <template if:true={isLoading}>
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <template if:false={isLoading}>
        <!-- ═══════════════════════════════════════ -->
        <!-- HEADER BAR                              -->
        <!-- ═══════════════════════════════════════ -->
        <div class="detail-header">
            <div class="header-left">
                <lightning-combobox
                    label="Section"
                    value={selectedSectionId}
                    options={sectionOptions}
                    onchange={handleSectionChange}
                    variant="label-hidden"
                    class="section-selector"
                ></lightning-combobox>
            </div>
            <div class="header-center">
                <span class="exam-index-label">{examIndexLabel}</span>
            </div>
            <div class="header-right">
                <lightning-button-icon
                    icon-name="utility:add"
                    alternative-text="Add Question"
                    variant="border-filled"
                    size="small"
                    onclick={handleAdd}
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:edit"
                    alternative-text="Edit Question"
                    variant="border-filled"
                    size="small"
                    onclick={handleEdit}
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:sort"
                    alternative-text="Sort Questions"
                    variant="border-filled"
                    size="small"
                    onclick={handleSort}
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:delete"
                    alternative-text="Delete Question"
                    variant="border-filled"
                    size="small"
                    onclick={handleDelete}
                ></lightning-button-icon>
            </div>
        </div>

        <!-- ═══════════════════════════════════════ -->
        <!-- QUESTION AREA                           -->
        <!-- ═══════════════════════════════════════ -->
        <template if:true={hasExams}>
            <div class="question-stage">
                <!-- Previous peek -->
                <!-- <template if:true={hasPrevious}>
                    <div class="peek-card peek-left" onclick={handlePrevious}>
                        <lightning-icon
                            icon-name="utility:chevronleft"
                            size="small"
                        ></lightning-icon>
                    </div>
                </template> -->

                <!-- Main question card -->
                <div class="question-card">
                    <!-- Question text -->
                    <div class="question-text-area">
                        <div class="question-text">{questionText}</div>
                    </div>

                    <!-- Answer options -->
                    <div class="answer-options">
                        <template for:each={answers} for:item="ans">
                            <div
                                key={ans.id}
                                class={ans.optionClass}
                                data-answer-id={ans.id}
                                onclick={handleSelectAnswer}
                            >
                                <div class={ans.radioClass}>
                                    <template if:true={ans.showDot}>
                                        <div class={ans.dotClass}></div>
                                    </template>
                                </div>
                                <span class="answer-text">{ans.text}</span>
                            </div>
                        </template>
                    </div>

                    <!-- Submit button -->
                    <template if:false={isSubmitted}>
                        <div class="submit-area">
                            <lightning-button
                                label="Submit Answer"
                                variant="brand"
                                onclick={handleSubmit}
                                disabled={disableSubmit}
                            ></lightning-button>
                        </div>
                    </template>

                    <!-- Result + Explanation -->
                    <template if:true={isSubmitted}>
                        <div class="explanation-area">
                            <span class={resultBadgeClass}>{resultBadgeText}</span>
                            <template if:true={hasExplanation}>
                                <p class="explanation-label">Explanation</p>
                                <div class="explanation-text">{explanationText}</div>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Next peek -->
                <!-- <template if:true={hasNext}>
                    <div class="peek-card peek-right" onclick={handleNext}>
                        <lightning-icon
                            icon-name="utility:chevronright"
                            size="small"
                        ></lightning-icon>
                    </div>
                </template> -->
            </div>
        </template>

        <!-- Empty state -->
        <template if:false={hasExams}>
            <div class="empty-state">
                <lightning-icon
                    icon-name="standard:question_feed"
                    size="large"
                ></lightning-icon>
                <p class="slds-m-top_small slds-text-color_weak">
                    No questions in this section. Click "+" to add a question.
                </p>
            </div>
        </template>

        <!-- ═══════════════════════════════════════ -->
        <!-- RESOURCES PANEL (toggleable)            -->
        <!-- ═══════════════════════════════════════ -->
        <template if:true={showResourcesPanel}>
            <div class="resources-panel">
                <h4 class="resources-panel-title">Referenced Resources</h4>
                <template if:true={hasLinkedResources}>
                    <template for:each={linkedResources} for:item="res">
                        <div key={res.Id} class="resource-link-row">
                            <lightning-icon
                                icon-name="utility:link"
                                size="xx-small"
                                class="slds-m-right_x-small"
                            ></lightning-icon>
                            <a href={res.Link__c} target="_blank">{res.Title__c}</a>
                        </div>
                    </template>
                </template>
                <template if:false={hasLinkedResources}>
                    <p class="slds-text-color_weak slds-text-body_small">
                        No resources linked to this question.
                    </p>
                </template>
            </div>
        </template>

        <!-- ═══════════════════════════════════════ -->
        <!-- FOOTER BAR                              -->
        <!-- ═══════════════════════════════════════ -->
        <div class="detail-footer">
            <div class="footer-left">
                <lightning-button
                    label="View Resources"
                    variant="neutral"
                    onclick={handleViewResources}
                ></lightning-button>
            </div>
            <div class="footer-center">
                <lightning-button-icon
                    icon-name="utility:left"
                    alternative-text="Previous Question"
                    variant="border-filled"
                    onclick={handlePrevious}
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:right"
                    alternative-text="Next Question"
                    variant="border-filled"
                    onclick={handleNext}
                    class="slds-m-left_x-small"
                ></lightning-button-icon>
            </div>
            <div class="footer-right">
                <lightning-button-icon
                    icon-name={bookmarkIcon}
                    alternative-text="Toggle Bookmark"
                    variant={bookmarkVariant}
                    size="medium"
                    onclick={handleToggleBookmark}
                    class="slds-m-right_small"
                ></lightning-button-icon>
                <lightning-button
                    label="Close"
                    variant="brand"
                    onclick={handleClose}
                ></lightning-button>
            </div>
        </div>
    </template>

    <!-- Delete Exam Confirmation Modal -->
    <c-nsf-confirmation-modal
        data-id="delete-exam"
        header="Delete this question?"
        message={deleteExamMessage}
        onconfirm={handleConfirmDeleteExam}
    ></c-nsf-confirmation-modal>
</template>
